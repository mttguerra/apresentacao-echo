<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echo Agency — Apresentação</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #fff;
      }
      #deck {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }
      .slide {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        opacity: 0;
        transition: opacity 220ms ease;
        pointer-events: none;
      }
      .slide.active {
        opacity: 1;
        pointer-events: auto;
      }
      .slide img {
        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: auto;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }
      #counter {
        position: fixed;
        right: 16px;
        bottom: 12px;
        font-size: 12px;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.45);
        font-variant-numeric: tabular-nums;
        pointer-events: none;
      }
      #nav-left,
      #nav-right {
        position: fixed;
        top: 0;
        bottom: 0;
        width: 50%;
        cursor: pointer;
        background: transparent;
      }
      #nav-left {
        left: 0;
      }
      #nav-right {
        right: 0;
      }
    </style>
  </head>
  <body>
    <div id="deck"></div>
    <div id="counter"></div>
    <div id="nav-left" title="Anterior"></div>
    <div id="nav-right" title="Próximo"></div>

    <script type="module">
      const total = 6;
      const deck = document.getElementById("deck");
      const counter = document.getElementById("counter");

      for (let i = 1; i <= total; i++) {
        const s = document.createElement("div");
        s.className = "slide";
        s.dataset.index = i;
        const img = document.createElement("img");
        img.src = `/slides/${i}.png`;
        img.alt = `Slide ${i}`;
        img.loading = i === 1 ? "eager" : "lazy";
        img.decoding = "async";
        s.appendChild(img);
        deck.appendChild(s);
      }

      const slides = [...deck.querySelectorAll(".slide")];
      let current = 0;

      function go(to) {
        const next = Math.max(0, Math.min(total - 1, to));
        if (next === current && slides[current].classList.contains("active"))
          return;
        slides[current].classList.remove("active");
        slides[next].classList.add("active");
        current = next;
        counter.textContent = `${current + 1} / ${total}`;
        const hash = `#${current + 1}`;
        if (location.hash !== hash) history.replaceState(null, "", hash);
      }

      function fromHash() {
        const n = parseInt(location.hash.replace("#", ""), 10);
        if (Number.isFinite(n) && n >= 1 && n <= total) go(n - 1);
        else go(0);
      }

      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " ") {
          e.preventDefault();
          go(current + 1);
        } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
          e.preventDefault();
          go(current - 1);
        } else if (e.key === "Home") {
          go(0);
        } else if (e.key === "End") {
          go(total - 1);
        }
      });

      document
        .getElementById("nav-right")
        .addEventListener("click", () => go(current + 1));
      document
        .getElementById("nav-left")
        .addEventListener("click", () => go(current - 1));

      window.addEventListener("hashchange", fromHash);
      fromHash();
    </script>
  </body>
</html>
